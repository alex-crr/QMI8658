sentence=Arduino library for the QMI8658 6-axis IMU (accelerometer + gyroscope).
paragraph=Supports configurable ranges and ODR, low-pass filtering, tap detection, pedometer, any-motion/no-motion/significant-motion detection, FIFO burst reads, on-chip Attitude Engine (quaternion sensor fusion), interrupt configuration, temperature reading, and self-test. Works over I2C with custom pin support for ESP32, RP2040, STM32, and other platforms.
